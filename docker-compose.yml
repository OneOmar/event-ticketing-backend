services:

  # PostgreSQL database
  postgres:
    image: postgres:latest
    container_name: event-ticketing-db
    restart: always

    environment:
      POSTGRES_DB: event_ticketing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changemeinprod!

    ports:
      - "5432:5432"

  # Database management UI
  adminer:
    image: adminer:latest
    container_name: event-ticketing-adminer
    restart: always

    ports:
      - "8081:8080"

    depends_on:
      # Start postgres first
      - postgres

  # Keycloak authentication server
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: event-ticketing-keycloak
    restart: always

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

    volumes:
      - keycloak_data:/opt/keycloak/data

    ports:
      - "8082:8080"

    command:
      - start-dev
      - --db=dev-file

volumes:
  keycloak_data:
